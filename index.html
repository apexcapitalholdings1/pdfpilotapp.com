<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDFPilot — Professional PDF Editor for iPhone & iPad</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
            background: #0a0a0a;
            color: #f5f5f5;
            line-height: 1.6;
        }
        .container { max-width: 720px; margin: 0 auto; padding: 60px 24px; }
        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
        }
        .brand { color: #e63946; }
        .tagline {
            font-size: 1.1rem;
            color: #999;
            margin-bottom: 48px;
        }
        .links {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }
        .links a {
            color: #e63946;
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            padding: 12px 24px;
            border: 1px solid #e6394640;
            border-radius: 12px;
            transition: all 0.2s;
        }
        .links a:hover {
            background: #e6394615;
            border-color: #e63946;
        }
        .footer {
            margin-top: 80px;
            color: #666;
            font-size: 0.85rem;
        }
        .footer a { color: #999; text-decoration: none; }
        .footer a:hover { color: #e63946; }
    </style>
</head>
<body>
    <div class="container">
        <h1><span class="brand">PDFPilot</span></h1>
        <p class="tagline">Professional PDF editing, annotation, and AI-powered analysis — entirely on your device.</p>

        <div class="links">
            <a href="/terms">Terms of Service</a>
            <a href="/privacy">Privacy Policy</a>
            <a href="mailto:support@pdfpilotapp.com">Contact Support</a>
        </div>

        <div class="footer">
            <p>&copy; 2026 PDFPilot. All rights reserved.</p>
            <p style="margin-top: 8px;">
                <a href="mailto:support@pdfpilotapp.com">support@pdfpilotapp.com</a>
            </p>
        </div>
    </div>
</body>
</html>
